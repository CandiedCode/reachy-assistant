# Ruff configuration for linting and formatting

# Target Python version
target-version = "py312"

# Line length
line-length = 140

# Include these file patterns
include = ["*.py", "*.pyi"]

# Exclude patterns
exclude = [
    ".git",
    ".venv",
    ".tox",
    "build",
    "dist",
    "*.egg-info",
    "venv",
    "alembic",
    "reachy_assistant/services/calendars/hive/scraper.py",
]

[format]
docstring-code-format = true
# We want to keep the docstring code line length to 80 characters so that it fits on the screen in the docsite.
docstring-code-line-length = 80

[lint]
ignore = [
    'ANN401',  # Any type is disallowed
    'ARG005',  # Unused lambda argument
    'D107',  # Missing docstring in __init__
    'D202',  # No blank lines allowed after function docstring
    'D205',  # 1 blank line required between summary line and description
    'E501',  # Line too long
    'FA102',  # Missing `from __future__ import annotations`, but uses PEP 585 collection
    'N812',  # Lowercase `functional` imported as non-lowercase `F`
    'PYI051',  # `Literal[...]` is redundant in a union with `...`
    'RET504',  # Unnecessary assignment before `return` statement
    'S101',  # Use of assert detected
    'SIM115',  # Checks for cases where files are opened (e.g., using the builtin open() function) without using a context manager.
    'SIM300',  # yoda-conditions: Checks for conditions that position a constant on the left-hand side of the comparison operator, rather than the right-hand side.
    'TC001',  # Application imports for type checking only should be placed within `if TYPE_CHECKING:` blocks.
    'TC002',  # Third party imports for type checking only should be placed within `if TYPE_CHECKING:` blocks.
    'TC003',  # Standard imports for type checking only should be placed within `if TYPE_CHECKING:` blocks.
]

# select = ['PL', 'TD', 'FIX']
select = [
    'A',  # flake8-builtins,
    'ANN',  # flake8-annotations
    'ARG',  # flake8-unused-arguments
    'ASYNC',  # flake8-async
    'B',  # Bugbear finding likely bugs and design problems in your program
    'BLE',  # flake8-blind-except
    'C4',  # flake8-comprehensions
    'C90',  # mccabe complexity
    'D',  # pydocstyle
    'D400',  # First line should end with a period
    'D401',  # First line should be in imperative mood
    'D404',  # First word of the docstring should not be This
    'D406',  # Section name should end with a newline
    'DTZ',  # flake8-datetimez
    'E',  # pycodestyle Error
    'EM',  # flake8-errormsg
    'ERA',  # eradicate
    'F',  # Pyflakes
    'F401',  # Unused Imports
    'FA',  # Future Annotations
    'G',  # flake8-logging-forma
    'I',  # Isort
    'INP',  # flake8-no-pep420 Bans Implicit Namespace Packages
    'N',  # pep8-naming
    'NPY',  # NumPy Rules
    'PERF',  # performance
    'PGH',  # pygrep-hooks
    'PLC',  # pylint convention
    'PLE',  # pylint error
    'PLR',  # pylint refactor
    'PLW',  # pylint warning
    'PTH',  # flake8-use-pathlib
    'PYI',  # flake8-pyi
    'RET',  # flake8-return
    'RSE',  # flake8-raise
    'RUF',  # Ruff
    'S',  # flake8-bandit
    'SIM',  # flake8-simplify
    'T20',  # flake8-print
    'TC',  # flake8-type-checking
    'TID',  # Pyflake Tidy Import (for banning relative imports)
    'TRY',  # tryceratops
    'UP',  # Pyupgrade macros
    'W',  # pycodestyle warning
]

[lint.flake8-builtins]
builtins-ignorelist = ["input"]

[lint.flake8-tidy-imports]
ban-relative-imports = 'all'

[lint.flake8-unused-arguments]
ignore-variadic-names = true

[lint.isort]
combine-as-imports = true
known-first-party = [
    "reachy_assistant",
    "tests",
]
known-third-party = []
split-on-trailing-comma = false

[lint.mccabe]
max-complexity = 12

[lint.pep8-naming]
ignore-names = [
    "setUp",
    "setUpClass",
    "tearDown",
    "tearDownClass",
]

[lint.per-file-ignores]
"__init__.py" = [
    "F401",  # Import imported into __init__ by unused; consider adding to `__all__` or using a redundant alias
    "F403",  # `from foo import *` used; unable to detect undefined names
]

"tests/*.py" = [
    "BLE001",  # Blind except: `except:` or `except Exception:` used
    "D100",  # Missing docstring in public module
    "D101",  # Missing docstring in public class
    "D104",  # Missing docstring in public package
    "D106",  # Missing docstring in public nested class
    "PLR2004", # Magic value used in comparison
]

[lint.pydocstyle]
convention = "google"

[lint.pylint]
max-args = 16
max-branches = 15
max-locals = 20
max-positional-args = 6